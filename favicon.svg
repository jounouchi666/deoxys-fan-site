<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Deoxys cosmic orb">
  <defs>
    <clipPath id="orb-clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
    <radialGradient id="gloss" cx="45%" cy="38%" r="20%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".36" stop-color="#fff"/>
      <stop offset=".48" stop-color="#45d9ff"/>
      <stop offset="1" stop-color="#45d9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#45d9ff" flood-opacity=".45"/>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="30" fill="#050712"/>
  <g clip-path="url(#orb-clip)" filter="url(#soft-glow)">
    <path d="M32 32 L58 17 A30 30 0 0 1 54 50 Z" fill="#45d9ff"/>
    <path d="M32 32 L54 50 A30 30 0 0 1 6 47 Z" fill="#ffd166"/>
    <path d="M32 32 L6 47 A30 30 0 0 1 58 17 Z" fill="#ff2e63"/>
    <circle cx="32" cy="32" r="31" fill="url(#gloss)"/>
  </g>

  <ellipse cx="32" cy="32" rx="20" ry="15" fill="none" stroke="#fff" stroke-width="3.4" stroke-opacity=".82" transform="rotate(28 32 32)"/>
  <ellipse cx="32" cy="32" rx="20" ry="15" fill="none" stroke="#fff" stroke-width="3.4" stroke-opacity=".36" transform="rotate(-34 32 32)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="1"/>
</svg>
